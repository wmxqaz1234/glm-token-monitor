name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # 前端检查
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check TypeScript types
        run: npm run check || echo "TypeScript check skipped (known issue)"
        continue-on-error: true

      - name: Lint (if available)
        run: npm run lint || echo "No lint script configured"
        continue-on-error: true

      - name: Build frontend
        run: npm run build

  # Rust 检查
  rust-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Check Rust code
        working-directory: ./src-tauri
        run: cargo check --verbose

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --verbose

      - name: Check formatting
        working-directory: ./src-tauri
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Run Clippy
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true
